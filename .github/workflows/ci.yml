name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Poppler runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run test suite
        id: pytest
        env:
          PYTHONPATH: src
        shell: bash
        run: |
          set +e
          python -m pytest -q --junitxml=pytest-results.xml > pytest.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          tail -n 80 pytest.log
          exit 0

      - name: Upload pytest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            pytest.log
            pytest-results.xml
          if-no-files-found: error
          retention-days: 14

      - name: Check whitespace errors
        shell: bash
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi

      - name: Enforce pytest result
        if: always()
        shell: bash
        run: |
          status="${{ steps.pytest.outputs.exit_code }}"
          if [ -z "$status" ]; then
            echo "pytest did not report an exit code" >&2
            exit 1
          fi
          exit "$status"
