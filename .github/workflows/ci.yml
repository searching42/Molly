name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Compile source tree
        run: python -m compileall -q src

      - name: Run test suite
        run: python -m pytest -q

      - name: Check pull request whitespace errors
        if: github.event_name == 'pull_request'
        run: git diff --check "$(git merge-base HEAD origin/${{ github.base_ref }})" HEAD

      - name: Check push whitespace errors
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}" HEAD
