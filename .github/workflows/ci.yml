name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -q --upgrade pip && python -m pip install -q -e ".[dev]" rdkit

      - name: Compile source tree
        run: python -m compileall -q src claude/scripts

      - name: Run test suite
        id: pytest
        continue-on-error: true
        shell: bash
        run: set -o pipefail; python -m pytest -q --tb=short 2>&1 | tee pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest.log
          if-no-files-found: error

      - name: Fail when tests fail
        if: steps.pytest.outcome == 'failure'
        run: exit 1

      - name: Check pull request whitespace errors
        if: github.event_name == 'pull_request'
        run: git diff --check "$(git merge-base HEAD origin/${{ github.base_ref }})" HEAD

      - name: Check push whitespace errors
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}" HEAD
