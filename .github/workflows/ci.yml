name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    # Each deterministic half has its own hard pytest limit and evidence. Keep
    # the job alive long enough to upload that evidence when pytest times out.
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Poppler runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends poppler-utils

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run test suite
        id: pytest
        env:
          PYTHONPATH: src
        shell: bash
        run: |
          set +e
          mapfile -t selected_tests < <(
            find tests -type f -name 'test_*.py' -print \
              | LC_ALL=C sort \
              | awk -v shard="${{ matrix.shard }}" '((NR - 1) % 2) == shard'
          )
          if [ "${#selected_tests[@]}" -eq 0 ]; then
            echo "pytest shard ${{ matrix.shard }} selected no test files" > pytest.log
            status=2
          else
            printf 'pytest shard %s selected %s files\n' \
              "${{ matrix.shard }}" "${#selected_tests[@]}" > pytest.log
            printf '%s\n' "${selected_tests[@]}" >> pytest.log
            timeout --signal=TERM --kill-after=30s 25m \
              python -m pytest -q --junitxml=pytest-results.xml \
              "${selected_tests[@]}" >> pytest.log 2>&1
            status=$?
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          tail -n 80 pytest.log
          exit 0

      - name: Upload pytest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-evidence-${{ github.run_id }}-${{ github.run_attempt }}-shard-${{ matrix.shard }}
          path: |
            pytest.log
            pytest-results.xml
          if-no-files-found: error
          retention-days: 14

      - name: Check whitespace errors
        shell: bash
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi

      - name: Enforce pytest result
        if: always()
        shell: bash
        run: |
          status="${{ steps.pytest.outputs.exit_code }}"
          if [ -z "$status" ]; then
            echo "pytest did not report an exit code" >&2
            exit 1
          fi
          exit "$status"
